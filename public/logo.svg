<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 128" fill="#ffffff">
  <title>Monogate</title>
  <desc>MG monogram — angular M fused with blocky G</desc>
  <!-- M: two outer legs with an inner V-valley, stylised to echo the logo art -->
  <path d="M20 16 h18 v38 l24 34 24-34 V16 h18 v96 h-18 V76 l-24 34 -24-34 V112 H20 Z"/>
  <!-- G: blocky with right-side crossbar, the mirror-partner of the M -->
  <path d="M112 16 h68 v18 h-12 v-6 h-38 v56 h38 V64 h-20 V50 h32 v62 h-68 Z"/>
</svg>
